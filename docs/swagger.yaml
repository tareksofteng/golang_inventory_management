basePath: /api/v1
definitions:
  internal_controllers.CreateCategoryRequest:
    properties:
      description:
        maxLength: 255
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  internal_controllers.CreateCustomerRequest:
    properties:
      address:
        maxLength: 255
        type: string
      due:
        minimum: 0
        type: number
      email:
        maxLength: 100
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      phone:
        maxLength: 20
        type: string
    required:
    - name
    type: object
  internal_controllers.CreateProductRequest:
    properties:
      category_id:
        type: integer
      cost_price:
        minimum: 0
        type: number
      image:
        maxLength: 255
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 150
        minLength: 2
        type: string
      price:
        minimum: 0
        type: number
      quantity:
        minimum: 0
        type: integer
      sku:
        maxLength: 50
        type: string
      supplier_id:
        type: integer
      unit:
        maxLength: 20
        type: string
    required:
    - category_id
    - name
    - sku
    - supplier_id
    type: object
  internal_controllers.CreatePurchaseRequest:
    properties:
      discount:
        minimum: 0
        type: number
      items:
        items:
          $ref: '#/definitions/internal_controllers.PurchaseItemRequest'
        minItems: 1
        type: array
      note:
        maxLength: 255
        type: string
      paid_amount:
        minimum: 0
        type: number
      supplier_id:
        type: integer
      tax_percent:
        minimum: 0
        type: number
    required:
    - items
    - supplier_id
    type: object
  internal_controllers.CreatePurchaseReturnRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_controllers.ReturnItemRequest'
        minItems: 1
        type: array
      note:
        maxLength: 255
        type: string
      purchase_id:
        type: integer
    required:
    - items
    - purchase_id
    type: object
  internal_controllers.CreateSaleRequest:
    properties:
      customer_id:
        type: integer
      discount:
        minimum: 0
        type: number
      items:
        items:
          $ref: '#/definitions/internal_controllers.SaleItemRequest'
        minItems: 1
        type: array
      note:
        maxLength: 255
        type: string
      paid_amount:
        minimum: 0
        type: number
      tax_percent:
        minimum: 0
        type: number
    required:
    - customer_id
    - items
    type: object
  internal_controllers.CreateSaleReturnRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_controllers.ReturnItemRequest'
        minItems: 1
        type: array
      note:
        maxLength: 255
        type: string
      sale_id:
        type: integer
    required:
    - items
    - sale_id
    type: object
  internal_controllers.CreateSupplierRequest:
    properties:
      address:
        maxLength: 255
        type: string
      email:
        maxLength: 100
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      phone:
        maxLength: 20
        type: string
    required:
    - email
    - name
    type: object
  internal_controllers.CreateUserRequest:
    properties:
      email:
        maxLength: 100
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 6
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        enum:
        - super_admin
        - admin
        - manager
        - salesman
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  internal_controllers.CustomerPaymentRequest:
    properties:
      amount:
        type: number
      customer_id:
        type: integer
      method:
        enum:
        - cash
        - bank
        - mobile
        type: string
      note:
        maxLength: 255
        type: string
    required:
    - amount
    - customer_id
    - method
    type: object
  internal_controllers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_controllers.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_controllers.PurchaseItemRequest:
    properties:
      product_id:
        type: integer
      quantity:
        type: integer
      unit_cost:
        minimum: 0
        type: number
    required:
    - product_id
    - quantity
    type: object
  internal_controllers.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_controllers.ReturnItemRequest:
    properties:
      product_id:
        type: integer
      quantity:
        description: 0 = line not returned
        minimum: 0
        type: integer
      unit_value:
        minimum: 0
        type: number
    required:
    - product_id
    type: object
  internal_controllers.SaleItemRequest:
    properties:
      product_id:
        type: integer
      quantity:
        type: integer
      unit_price:
        minimum: 0
        type: number
    required:
    - product_id
    - quantity
    type: object
  internal_controllers.SupplierPaymentRequest:
    properties:
      amount:
        type: number
      method:
        enum:
        - cash
        - bank
        - mobile
        type: string
      note:
        maxLength: 255
        type: string
      supplier_id:
        type: integer
    required:
    - amount
    - method
    - supplier_id
    type: object
  internal_controllers.UpdateProductRequest:
    properties:
      category_id:
        type: integer
      cost_price:
        minimum: 0
        type: number
      image:
        maxLength: 255
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 150
        minLength: 2
        type: string
      price:
        minimum: 0
        type: number
      sku:
        maxLength: 50
        type: string
      supplier_id:
        type: integer
      unit:
        maxLength: 20
        type: string
    required:
    - category_id
    - name
    - sku
    - supplier_id
    type: object
host: localhost:9000
info:
  contact: {}
  description: |-
    Production-style inventory + POS REST API built with Gin, GORM and MySQL.
    Authenticate via POST /auth/login, then click "Authorize" and enter: Bearer &lt;access_token&gt;.
  title: Inventory Management API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Log in and receive access + refresh tokens
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Revoke a refresh token (logout)
      tags:
      - Auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get the current authenticated user + permissions
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Rotate the refresh token and get a new access token
      tags:
      - Auth
  /categories:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List categories (paginated, searchable)
      tags:
      - Categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Category
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a category
      tags:
      - Categories
  /customers:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search by name, email or phone
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List customers (paginated, searchable)
      tags:
      - Customers
    post:
      consumes:
      - application/json
      parameters:
      - description: Customer
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a customer
      tags:
      - Customers
  /dashboard/summary:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Dashboard summary (KPIs, finance, low stock, top products, trend)
      tags:
      - Dashboard
  /ledger/customer/{id}:
    get:
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Customer ledger — full statement with running balance
      tags:
      - Ledger
  /ledger/supplier/{id}:
    get:
      parameters:
      - description: Supplier ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Supplier ledger — full statement with running balance
      tags:
      - Ledger
  /payments:
    get:
      parameters:
      - description: 'Filter: customer | supplier'
        in: query
        name: type
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Payment history (optionally filter by party type)
      tags:
      - Payments
  /payments/customer:
    post:
      consumes:
      - application/json
      parameters:
      - description: Payment
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.CustomerPaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Receive a payment from a customer (reduces customer due)
      tags:
      - Payments
  /payments/supplier:
    post:
      consumes:
      - application/json
      parameters:
      - description: Payment
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.SupplierPaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Pay a supplier (reduces supplier due)
      tags:
      - Payments
  /products:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search by name or SKU
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List products (paginated, searchable)
      tags:
      - Products
    post:
      consumes:
      - application/json
      parameters:
      - description: Product
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a product
      tags:
      - Products
  /products/{id}:
    delete:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a product (soft delete)
      tags:
      - Products
    get:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get a product by id
      tags:
      - Products
    put:
      consumes:
      - application/json
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Product
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update a product
      tags:
      - Products
  /purchases:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search by invoice no
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List purchases (paginated)
      tags:
      - Purchases
    post:
      consumes:
      - application/json
      parameters:
      - description: Purchase with line items
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.CreatePurchaseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a purchase invoice (increases stock + supplier due, transactional)
      tags:
      - Purchases
  /purchases/{id}:
    delete:
      parameters:
      - description: Purchase ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Void a purchase (reverses stock + supplier due, transactional)
      tags:
      - Purchases
  /reports/customer-due:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Customers with outstanding due
      tags:
      - Reports
  /reports/purchases:
    get:
      parameters:
      - description: From date (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: To date (YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Purchase report for a date range
      tags:
      - Reports
  /reports/sales:
    get:
      parameters:
      - description: From date (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: To date (YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Sales report for a date range
      tags:
      - Reports
  /reports/stock:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Current stock report with total stock value
      tags:
      - Reports
  /reports/supplier-due:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Suppliers we owe money to
      tags:
      - Reports
  /returns/purchase:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List purchase returns (paginated)
      tags:
      - Returns
    post:
      consumes:
      - application/json
      parameters:
      - description: Purchase return
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.CreatePurchaseReturnRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Return goods against a purchase invoice (decreases stock + supplier
        due)
      tags:
      - Returns
  /returns/purchase/lookup:
    get:
      parameters:
      - description: Purchase invoice number
        in: query
        name: invoice
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Find a purchase by invoice no with returnable quantities
      tags:
      - Returns
  /returns/sale:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List sale returns (paginated)
      tags:
      - Returns
    post:
      consumes:
      - application/json
      parameters:
      - description: Sale return
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.CreateSaleReturnRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Return goods against a sale invoice (increases stock + reduces customer
        due)
      tags:
      - Returns
  /returns/sale/lookup:
    get:
      parameters:
      - description: Sale invoice number
        in: query
        name: invoice
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Find a sale by invoice no with returnable quantities
      tags:
      - Returns
  /sales:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search by invoice no
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List sales (paginated)
      tags:
      - Sales
    post:
      consumes:
      - application/json
      parameters:
      - description: Sale with line items
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.CreateSaleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "422":
          description: insufficient stock
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a sale invoice (decreases stock + customer due, transactional,
        oversell-guarded)
      tags:
      - Sales
  /sales/{id}:
    delete:
      parameters:
      - description: Sale ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Void a sale (returns stock + reverses customer due, transactional)
      tags:
      - Sales
  /suppliers:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search by name or email
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List suppliers (paginated, searchable)
      tags:
      - Suppliers
    post:
      consumes:
      - application/json
      parameters:
      - description: Supplier
        in: body
        name: body
